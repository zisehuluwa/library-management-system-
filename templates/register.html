<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 智慧图书馆</title>
    <link rel="stylesheet" href="/static/css/antd-style.css">
</head>
<body>
    <div class="auth-bg">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">📚</div>
                <h1 class="auth-title">智慧图书馆</h1>
                <p class="auth-subtitle">加入我们，开始阅读之旅</p>
            </div>
            <div class="auth-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="message message-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form class="auth-form" method="POST">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-input" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-input" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">注册</button>
                </form>

                <div class="auth-footer">
                    <p>已有账号？ <a href="/login">立即登录</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
