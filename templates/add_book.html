<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加图书 - 智慧图书馆</title>
    <link rel="stylesheet" href="/static/css/antd-style.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">📚</div>
                <span class="logo-text">智慧图书馆</span>
            </a>
            <nav class="nav">
                <a href="/admin/dashboard" class="nav-item">仪表盘</a>
                <a href="/admin/users" class="nav-item">用户</a>
                <a href="/admin/ranking" class="nav-item">排行</a>
                <a href="/admin/add-book" class="nav-item active">添加</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="user-avatar">A</div>
            <a href="/logout" class="btn btn-outline">退出</a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="message message-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="card" style="max-width: 500px; padding: 2rem;">
                <h2 style="margin-bottom: 1.5rem; font-size: 1.1rem;">➕ 添加新图书</h2>
                <form method="POST">
                    <div class="form-group">
                        <label class="form-label">书名 *</label>
                        <input type="text" name="title" class="form-input" required placeholder="请输入图书名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">作者 *</label>
                        <input type="text" name="author" class="form-input" required placeholder="请输入作者">
                    </div>
                    <div class="form-group">
                        <label class="form-label">ISBN</label>
                        <input type="text" name="isbn" class="form-input" placeholder="请输入ISBN">
                    </div>
                    <div class="form-group">
                        <label class="form-label">分类</label>
                        <select name="category" class="form-input">
                            {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">数量 *</label>
                        <input type="number" name="copies" class="form-input" min="1" value="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary">添加</button>
                    <a href="/" class="btn btn-outline" style="margin-left: 8px;">取消</a>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
